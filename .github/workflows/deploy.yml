name: Build and Push to ECR.

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Tokyo'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Login to ECR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ECR_REGISTRY }}

      - uses: docker/build-push-action@v5
        with:
          file: ./containers/web/Dockerfile
          target: nginx
          build-args: |
            API_HOST=${{ vars.API_HOST }}
            API_SCHEME=${{ vars.API_SCHEME }}
            HOST_URL=${{ vars.HOST_URL }}
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/${{secrets.ECR_REPOSITORY}}:latest
            ${{ secrets.ECR_REGISTRY }}/${{secrets.ECR_REPOSITORY}}:${{github.sha}}
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.PAT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: executing remote ssh commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          port: ${{ secrets.PORT }}
          script: ${{ secrets.SCRIPT }}
